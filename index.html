<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Ingreso - Sistema de Gestion de Internos</title>
    <meta name="description" content="Ingreso al Sistema de Gestion de Internos del Instituto Federal de Varones.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #00355f;
            --primary-container: #0f4c81;
            --surface: #f7f9fb;
            --surface-container: #ffffff;
            --surface-muted: #edf2f7;
            --on-surface: #191c1e;
            --on-surface-variant: #42474f;
            --outline: #c2c7d1;
        }

        body {
            min-height: 100vh;
            font-family: Inter, sans-serif;
            background: linear-gradient(135deg, #00355f 0%, #0f4c81 62%, #1a6bb5 100%);
            color: var(--on-surface);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-shell {
            width: min(100%, 420px);
            background: var(--surface-container);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 24px 80px rgba(0, 20, 40, 0.28);
            border-radius: 8px;
            overflow: hidden;
        }

        .login-header {
            background: var(--surface);
            border-bottom: 1px solid var(--outline);
            padding: 28px;
            text-align: center;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            background: var(--primary);
            color: #fff;
            border-radius: 8px;
            display: grid;
            place-items: center;
        }

        .brand-icon .material-symbols-outlined {
            font-size: 28px;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--on-surface-variant);
            font-size: 14px;
            line-height: 1.5;
        }

        .login-form {
            padding: 28px;
            display: grid;
            gap: 18px;
        }

        label {
            display: block;
            color: var(--on-surface-variant);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .material-symbols-outlined {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--on-surface-variant);
            font-size: 20px;
        }

        input {
            width: 100%;
            height: 44px;
            border: 1px solid var(--outline);
            border-radius: 6px;
            background: var(--surface);
            color: var(--on-surface);
            font: inherit;
            padding: 0 12px 0 42px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        input:focus {
            border-color: var(--primary-container);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.14);
        }

        .login-button {
            margin-top: 8px;
            height: 46px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: background 0.18s ease, transform 0.12s ease;
        }

        .login-button:hover {
            background: var(--primary-container);
        }

        .login-button:active {
            transform: translateY(1px);
        }

        .login-note {
            border-top: 1px solid var(--outline);
            background: var(--surface-muted);
            color: var(--on-surface-variant);
            font-size: 12px;
            line-height: 1.5;
            padding: 14px 28px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="login-shell" aria-label="Ingreso al sistema">
        <section class="login-header">
            <div class="brand-icon" aria-hidden="true">
                <span class="material-symbols-outlined">corporate_fare</span>
            </div>
            <h1>Sistema de Gestion de Internos</h1>
            <p class="subtitle">Instituto Federal de Varones</p>
        </section>

        <form class="login-form" action="resumen_de_interno.html">
            <div>
                <label for="usuario">Usuario</label>
                <div class="input-wrap">
                    <span class="material-symbols-outlined" aria-hidden="true">person</span>
                    <input id="usuario" name="usuario" placeholder="Ingrese su usuario" autocomplete="username">
                </div>
            </div>

            <div>
                <label for="clave">Contraseña</label>
                <div class="input-wrap">
                    <span class="material-symbols-outlined" aria-hidden="true">lock</span>
                    <input id="clave" name="clave" type="password" placeholder="Ingrese su contraseña" autocomplete="current-password">
                </div>
            </div>

            <button class="login-button" type="submit">
                Ingresar
                <span class="material-symbols-outlined" aria-hidden="true">login</span>
            </button>
        </form>

        <p class="login-note">Acceso provisorio: por ahora el boton permite ingresar sin validar credenciales.</p>
    </main>
</body>
</html>
